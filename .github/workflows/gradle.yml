# This is a basic workflow to help you get started with the Run Jtest action.
name: Jtest with Gradle

on:
  # Trigger the workflow on push or pull request events but only for the main branch.
  push:
    branches: [ branch1 ]
  pull_request:
    branches: [ branch1 ]

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel.
jobs:
  build:
    name: Analyze project with Jtest
    
    permissions:
      # required for all workflows
      security-events: write
      
    # Specifies the type of runner that the job will run on.
    runs-on: self-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job.
    steps:
    
    # Checks out your repository under $GITHUB_WORKSPACE, so that your job can access it.
    - name: Checkout repository
      uses: actions/checkout@v4
      
    # Generates the jtest.data.json input file.
    - name: Create input for Jtest
      shell: cmd
      run: .\gradlew clean build jtest -I c:/Parasoft/jtest/2025.1.1/integration/gradle/init.gradle "-Djtest.config=jtest.dtp://Recommended Rules_CustomRule_ABC"
      #run: .\gradlew clean build jtest -I c:/Parasoft/jtest/2025.1.1/integration/gradle/init.gradle "-Djtest.config=user://RR_modify1"

    # Runs code analysis with Jtest.
    #- name: Run Jtest
    #  id: jtest
    #  uses: parasoft/run-jtest-action@2.0.2
    #  with:
    #    #Uses the jtest.data.json generated with the Gradle command in the previous step
    #    input: build/jtest/jtest.data.json
    # Uploads analysis results in the SARIF format, so that they are displayed as GitHub code scanning alerts.
    - name: Upload results (SARIF)
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        #sarif_file: reports/report.sarif # reports is a default location for reports directory
        sarif_file: c:/actions-runner2331_jtest2025.2.2/_work/jtest_demo/jtest_demo/reports/report.sarif
        category: parasoft-jtest-SoftCode4
        #checkout_path: c:/actions-runner2331_jtest2025.2.2/_work/jtest_demo/jtest_demo        
        #matrix: null
        wait-for-processing: true
