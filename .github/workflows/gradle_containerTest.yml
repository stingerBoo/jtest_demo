# This is a basic workflow to help you get started with the Run Jtest action.
name: Jtest with Gradle

on:
  # Trigger the workflow on push or pull request events but only for the main branch.
  push:
    branches: [ container_test1 ]
  pull_request:
    branches: [ container_test1 ]

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel.
jobs:
  build:
    name: Analyze project with Jtest
    
    permissions:
      # required for all workflows
      security-events: write
      
    # Specifies the type of runner that the job will run on.
    runs-on: self-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job.
    steps:
    
    # Checks out your repository under $GITHUB_WORKSPACE, so that your job can access it.
    - name: Checkout repository
      uses: actions/checkout@v6
      #uses: actions/checkout@v5     
      #uses: actions/checkout@v6
      with:
    # Repository name with owner. For example, actions/checkout
       #Default: ${{ github.repository }}
       #path: d:\workspace\github\demo
       #path: d:/workspace/github/demo
       #path: .
       #ref: ${{ github.workspace }}
       #ref: "d:/workspace/github/demo"
       #ref: ${{ github.repository }}
       ref: container_test1
       #workspace: "d:/workspace/github/demo"
       #set-safe-directory: 'd:/workspace/github/demo2'
       #set-safe-directory: 'C:/actions-runner2331_jtest2025.2.2/_work/jtest_demo/jtest_demo'
       #repository: stingerBoo/jtest_demo
       #token: ${{ secrets.GIT_TECHDEPLOY_TOKEN }}
       #path: infrastructure-helm
      # === IMPORTANT ===
      # more likely fetch-depth 0 does not change timestamp of te files
      # =====
       fetch-depth: 0 
       
    - name: Run Container
      run: |              
              docker run --rm \
                -v ${{ github.workspace }}:/home/parasoft/example \
                --name c_jtest2025.2 -it jtest2025.2 \
                jtestcli \
                  -data demo.data.json \
                  -config "builtin://Recommended Rules"     
       
# Uploads analysis results in the SARIF format, so that they are displayed as GitHub code scanning alerts.
    - name: Upload results (SARIF)
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        #sarif_file: reports/report.sarif # reports is a default location for reports directory
        sarif_file: c:/actions-runner2331_jtest2025.2.2/_work/jtest_demo/jtest_demo/_reports/report.sarif
        category: parasoft-jtest-SoftCode4
        #checkout_path: c:/actions-runner2331_jtest2025.2.2/_work/jtest_demo/jtest_demo        
        #matrix: null
        wait-for-processing: true

  
